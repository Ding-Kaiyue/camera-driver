# Camera stream, publish names, and extrinsics for camera_driver.

camera:
  width: 424
  height: 240
  fps: 60
  sample_stride: 1
  max_frames: 0
  min_ray_m: 0.05
  max_ray_m: 2.50
  parent_frame: world

realsense:
  postprocess: false
  hole_fill_mode: -1
  emitter_enabled: true
  laser_power: -1.0

publish:
  world_frame: world
  obstacle_pointcloud_topic: /camera_driver/obstacle_pointcloud
  camera_world_pose_topic: /camera_driver/camera_world_pose
  camera_frame: camera_link

extrinsics:
  translation_xyz: [0.706, -0.510, 0.838]
  quaternion_xyzw: [0.514, 0.597, -0.440, -0.432]
